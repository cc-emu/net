name: Build and Publish Platform Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-platforms:
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            container: ''
          - os: ubuntu-latest
            platform: linuxmusl-x64
            container: alpine:latest
          - os: macos-15-intel
            platform: darwin-x64
            container: ''
          - os: macos-15
            platform: darwin-arm64
            container: ''
          - os: windows-latest
            platform: win32-x64
            container: ''
    
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        if: matrix.container == ''
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
      
      - name: Setup Node.js (Alpine)
        if: matrix.container != ''
        run: |
          apk add --no-cache nodejs npm git curl tar python3
          ln -sf /usr/bin/python3 /usr/local/bin/python
      
      - name: Setup Node.js registry (Alpine)
        if: matrix.container != ''
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Remove optionalDependencies for build
        run: node scripts/strip-optional-deps.js

      - name: Install dependencies (Ubuntu/macOS/Windows)
        if: matrix.container == ''
        run: npm ci

      - name: Install dependencies (Alpine)
        if: matrix.container != ''
        run: |
          apk add --no-cache cmake make g++
          npm ci

      - name: Build native addon
        run: npm run rebuild
      
      - name: Create platform package
        run: |
          node scripts/create-platform-package.js ${{ matrix.platform }} ${{ github.ref_name }}
          cp build/Release/ccemu-net.node pkg/
      
      - name: Publish platform package
        run: npm publish ./pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-main:
    permissions:
      contents: read
      packages: write
    needs: build-platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Remove optionalDependencies for install
        run: node scripts/strip-optional-deps.js

      - run: npm ci

      - name: Set package.json version
        run: node scripts/set-version.js ${{ github.ref_name }}

      - name: Update optionalDependencies
        run: node scripts/update-optional-deps.js ${{ github.ref_name }}

      - name: Publish main package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
